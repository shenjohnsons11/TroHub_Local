version: '3.8'

services:
  # App Mobile (Dành cho Khách Thuê)
  tenant-app:
    build: 
      context: .
      dockerfile: Dockerfile.expo
    container_name: trohub_tenant_app
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - trohub_network

  # Web Admin (Dành cho Chủ Trọ)
  webadmin:
    build: 
      context: ./webadmin
      dockerfile: Dockerfile
    container_name: trohub_webadmin
    ports:
      - "8084:8084" # Export port 8084 cho web admin
    environment:
      - NODE_ENV=development
    volumes:
      - ./webadmin:/app
    networks:
      - trohub_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trohub_backend
    ports:
      - "3000:3000" # Mở port 3000 cho Backend
    environment:
      - MONGODB_URI=mongodb://db:27017/trohub
      - MONGODB_DB=trohub
      - JWT_SECRET=trohub_secret_key_2026
      - PORT=3000
    networks:
      - trohub_network
    depends_on:
      - db

  # Database MongoDB
  db:
    image: mongo:6.0
    container_name: trohub_database
    ports:
      - "27017:27017"
    volumes:
      - db_data:/data/db
    networks:
      - trohub_network

networks:
  trohub_network:
    driver: bridge

volumes:
  db_data:
