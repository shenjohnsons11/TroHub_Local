version: '3.8'

services:
  # Cấu hình cho Frontend (TroHub React Native Web)
  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.expo
    container_name: trohub_frontend
    ports:
      - "8081:8081"
      - "8082:8082"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - trohub_network

  # [CHÚ Ý] Cấu hình cho Backend & Database (Cần có mã nguồn Backend)
  # Nếu bạn có source code Backend, hãy uncomment và sửa đường dẫn
  # backend:
  #   build:
  #     context: ../TroHub-Backend # Đường dẫn tới source backend
  #     dockerfile: Dockerfile
  #   container_name: trohub_backend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - DB_HOST=db
  #     - DB_USER=root
  #     - DB_PASSWORD=password
  #   networks:
  #     - trohub_network
  #   depends_on:
  #     - db

  # db:
  #   image: mysql:8.0 # Hoặc postgres / mongo tùy dự án
  #   container_name: trohub_database
  #   ports:
  #     - "3306:3306"
  #   environment:
  #     - MYSQL_ROOT_PASSWORD=password
  #     - MYSQL_DATABASE=trohub
  #   volumes:
  #     - db_data:/var/lib/mysql
  #     - ./init.sql:/docker-entrypoint-initdb.d/init.sql # File tự động tạo data mẫu (data local)
  #   networks:
  #     - trohub_network

networks:
  trohub_network:
    driver: bridge

volumes:
  db_data:
